version: "3.9"

services:
  mongo:
    image: mongo:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: edb
      MONGO_INITDB_ROOT_PASSWORD: edb
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: mongosh --quiet --eval "db.runCommand('ping').ok" -u edb -p edb
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    build: .
    environment:
      POSTGRES_PASSWORD: postgres
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_USER_NAME: edb
      MONGO_PWD: edb
    ports:
      - "5432:5432"
    depends_on:
      mongo:
        condition: service_healthy
